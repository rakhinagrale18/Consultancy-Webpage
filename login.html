<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MIW Consultancy | Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- =========================
            NAVBAR
    ========================== -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <img src="https://miweb.co.in/uploads/website-images/favicon-2026-03-24-09-36-10-2274.png" alt="MIW Consultancy Logo">

                <h2>MIW Consultancy</h2>

            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="aboutus.html">About Us</a></li>

                <li><a href="expertise.html">Expertise Areas</a></li>

                <li><a href="client.html">Client Logos</a></li>

                <li><a href="services.html">Services</a></li>

                <li><a href="contact.html">Contact Us</a></li>

                <li><a href="login.html" class="active">Login</a></li>

                <li><a href="../Signup/signup.html" class="signup-btn">Signup</a></li>

            </ul>

        </nav>

    </header>

    <!-- =========================
          LOGIN SECTION
    ========================== -->

    <section class="login-section">

        <div class="login-container">
                        <div class="login-card">

                <div class="login-header">

                    <h1>Welcome</h1>

                    <p>Sign in to access your MIW Consultancy account.</p>

                </div>

                <form action="#" method="post">

                    <!-- Email -->

                    <div class="input-group">

                        <label for="email">Email Address</label>

                        <div class="input-field">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                name="email"
                                placeholder="Enter your email"
                                required>

                        </div>

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <label for="password">Password</label>

                        <div class="input-field">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                required>

                            <span class="toggle-password">

                                <i class="fa-solid fa-eye"></i>

                            </span>

                        </div>

                    </div>

                    <!-- Remember Me -->

                    <div class="options">

                        <label class="remember">

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#" class="forgot-password">

                            Forgot Password?

                        </a>

                    </div>

                    <!-- Login Button -->

                    <button type="submit" class="login-btn">

                        Login

                    </button>

                </form>

                <div class="divider">

                    <span>OR</span>

                </div>

                <!-- Google Button -->

                <button class="google-btn">

                    <i class="fa-brands fa-google"></i>

                    Continue with Google

                </button>

                <!-- Signup Link -->

                <div class="signup-link">

                    <p>

                        Don't have an account?

                        <a href="../Signup/signup.html">

                            Sign Up

                        </a>

                    </p>

                </div>

            </div>
                    </div>

    </section>

    <!-- =========================
            FOOTER
========================== -->

<footer class="footer">

    <p>
        © 2026 MIW Consultancy. All Rights Reserved.
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
